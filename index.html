<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <base href="/teste/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DMaior Agency — Agência de Streamers Kwai</title>
  <meta name="description" content="A maior agência de streamers do Kwai. Suporte exclusivo, método próprio e premiações reais.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css?v=20260625-5">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <!-- Menu unificado — funciona em mobile e desktop -->
  <menu-mobile-dmaior></menu-mobile-dmaior>

  <main class="dm-main">

    <!-- 1º — Widget de live (abaixo da barra de menu) -->
    <kwai-live-widget></kwai-live-widget>

    <!-- 2º — Menu de serviços -->
    <dmaior-services-menu></dmaior-services-menu>

    <!-- 3º — Benefícios e FAQ (oculto no tema Dinâmico Pro) -->
    <div id="section-beneficios" class="dm-container">
      <widget-beneficios></widget-beneficios>
    </div>

  </main>

  <!-- Scripts na ordem correta: API → Auth → componentes -->
  <script src="js/preferences.js?v=20260624-3"></script>
  <script src="js/utils/helpers.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/router.js"></script>
  <script src="js/components/menu-mobile.js?v=20260628-cursos-1"></script>
  <script src="js/components/live-widget.js?v=20260630-3"></script>
  <script src="js/components/services-menu.js?v=20260625-9"></script>
  <script src="js/components/beneficios.js?v=20260624-3"></script>

  <script>
    // ── Controle de layout — oculta benefícios no tema Dinâmico Pro ──────────
    function aplicarLayout(layout) {
      var sec = document.getElementById('section-beneficios');
      if (!sec) return;
      // Dinâmico Pro: esconde seção de benefícios; Original: mostra
      sec.style.display = (layout === 'dinamico') ? 'none' : '';
    }

    // Aplica o tema salvo imediatamente ao carregar a página
    try {
      aplicarLayout(localStorage.getItem('dm_layout') || 'original');
    } catch (e) { /* localStorage bloqueado — mantém padrão */ }

    // Reage em tempo real quando o usuário troca o tema via engrenagem
    window.addEventListener('dmaior:layout', function(e) {
      try { aplicarLayout(e.detail && e.detail.layout ? e.detail.layout : 'original'); }
      catch (e) {}
    });
  </script>

  <dmaior-footer></dmaior-footer>
  <script src="js/components/footer.js?v=20260624-3"></script>
  <dmaior-cookie-consent></dmaior-cookie-consent>
  <script src="js/components/cookie-consent.js?v=20260624-3"></script>
</body>
</html>
