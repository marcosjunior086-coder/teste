  <link rel="stylesheet" href="css/components.css">
  <style>
    /* Base mínima — o próprio componente define todo o visual */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--dm-bg, #0c0c0c);
      min-height: 100%;
      width: 100%;

    dmaior-app {
      display: block;
      width: 100%;
      min-height: 100vh;
    }

  <!-- Menu público do site (tema/login compartilhado) -->
  <menu-mobile-dmaior></menu-mobile-dmaior>

  <!-- Componente painel completo — login + dashboard + carteira + perfil embutidos -->
  <dmaior-app></dmaior-app>

  <!-- api.js centraliza URLs dos workers -->
  <script charset=utf-8 src="js/preferences.js?v=20260709-i18n-1"></script>
  <script charset=utf-8 src="js/utils/helpers.js"></script>
  <script charset=utf-8 src="js/api.js?v=20260701-ranking-meses-1"></script>

  <!-- Componente votação — carregado antes do painel para estar definido quando usado -->

  <!-- Componente painel original — todo visual e fluxo completo -->
  <script charset=utf-8 src="js/components/dmaior-app.js?v=20260709-impulso-fix-1"></script>
  <!-- Menu mobile (inicializa tema e área de login no topo) -->
  <script charset=utf-8 src="js/components/menu-mobile.js?v=20260709-toggle-1"></script>
  <!-- router.js NÃO é carregado aqui: o painel tem fluxo de login próprio -->
  <dmaior-cookie-consent></dmaior-cookie-consent>
  <script charset=utf-8 src="js/components/cookie-consent.js?v=20260624-3"></script>
  <script charset=utf-8 src="js/pwa.js?v=20260703-pwa-1"></script>
