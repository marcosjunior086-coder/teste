<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <base href="/teste/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel do Streamer — DMaior Agency</title>
  <!-- CSS global — define variáveis de tema usadas pelo menu-mobile e componentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css?v=20260625-5">
  <link rel="stylesheet" href="css/components.css">
  <style>
    /* Base mínima — o próprio componente define todo o visual */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--dm-bg, #0c0c0c);
      min-height: 100%;
      width: 100%;
    }
    dmaior-app {
      display: block;
      width: 100%;
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <!-- Menu público do site (tema/login compartilhado) -->
  <menu-mobile-dmaior></menu-mobile-dmaior>

  <!-- Componente painel completo — login + dashboard + carteira + perfil embutidos -->
  <dmaior-app></dmaior-app>

  <!-- api.js centraliza URLs dos workers -->
  <script src="js/preferences.js?v=20260624-3"></script>
  <script src="js/utils/helpers.js"></script>
  <script src="js/api.js?v=20260701-ranking-meses-1"></script>
  <!-- auth.js para sessão compartilhada com o menu -->
  <script src="js/auth.js"></script>
  <!-- Componente impulso — carregado antes do painel para estar definido quando usado -->
  <script src="js/components/dmaior-impulso.js?v=20260625-2"></script>
  <!-- Componente ranking inline — carregado antes do painel -->
  <script src="js/components/ranking-dmaior-painel.js?v=20260701-ranking-meses-1"></script>
  <!-- Componente painel original — todo visual e fluxo completo -->
  <script src="js/components/dmaior-app.js?v=20260628-historico-encoding-1"></script>
  <!-- Menu mobile (inicializa tema e área de login no topo) -->
  <script src="js/components/menu-mobile.js?v=20260625-7"></script>
  <!-- router.js NÃO é carregado aqui: o painel tem fluxo de login próprio -->
  <dmaior-cookie-consent></dmaior-cookie-consent>
  <script src="js/components/cookie-consent.js?v=20260624-3"></script>
</body>
</html>
