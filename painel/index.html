<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <base href="/teste/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel do Streamer — DMaior Agency</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    /* ── Tela de login ── */
    #login-screen {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-height: 100vh;
      padding: 60px 20px 40px;
      background: var(--dm-bg);
    }
    .login-box {
      width: 100%;
      max-width: 380px;
      padding: 40px 32px;
      text-align: center;
    }
    .login-logo {
      font-family: var(--dm-font-title);
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: var(--dm-grad-cyan);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }
    .login-sub {
      font-size: 0.78rem;
      color: var(--dm-text-muted);
      margin-bottom: 32px;
      letter-spacing: 0.5px;
    }
    .login-field {
      position: relative;
      margin-bottom: 16px;
      text-align: left;
    }
    .login-field label {
      display: block;
      font-size: 0.7rem;
      color: var(--dm-text-muted);
      font-family: var(--dm-font-title);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .login-field input {
      width: 100%;
      padding: 13px 16px;
      background: var(--dm-bg-card);
      border: 1px solid var(--dm-border);
      border-radius: 10px;
      color: var(--dm-text);
      font-family: 'Exo 2', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }
    .login-field input:focus {
      border-color: var(--dm-cyan);
      box-shadow: 0 0 0 3px var(--dm-cyan-08);
    }
    .login-field input[type="password"] {
      padding-right: 44px;
    }
    .toggle-pw {
      position: absolute;
      right: 14px;
      bottom: 13px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--dm-text-muted);
      display: flex;
      align-items: center;
      padding: 0;
      transition: color 0.2s;
    }
    .toggle-pw:hover { color: var(--dm-cyan); }
    .btn-entrar {
      width: 100%;
      padding: 14px;
      background: var(--dm-grad-cyan);
      border: none;
      border-radius: 10px;
      color: #000;
      font-family: var(--dm-font-title);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-entrar:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .btn-entrar:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-erro {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: 8px;
      color: var(--dm-red, #f87171);
      font-size: 0.82rem;
      text-align: left;
    }
    /* ── Painel (após login) ── */
    #painel-screen { display: none; }
    .painel-wrap {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .painel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 15px;
    }
    .painel-header h1 {
      font-family: var(--dm-font-title);
      color: var(--dm-cyan);
      font-size: clamp(1.4rem, 4vw, 2rem);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .painel-user {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .painel-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid var(--dm-cyan);
      object-fit: cover;
    }
    .painel-nome {
      font-family: var(--dm-font-title);
      color: var(--dm-text);
      font-size: 1rem;
      letter-spacing: 1px;
    }
    .painel-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card { padding: 24px; }
    .stat-label {
      font-size: 0.75rem;
      color: var(--dm-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }
    .stat-value {
      font-family: var(--dm-font-title);
      font-size: 2rem;
      color: var(--dm-cyan);
      letter-spacing: 1px;
    }
    .stat-sub {
      font-size: 0.8rem;
      color: var(--dm-text-muted);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <menu-mobile-dmaior></menu-mobile-dmaior>

  <!-- ── Tela de Login ── -->
  <div id="login-screen">
    <div class="login-box dm-glass-card">
      <div class="login-logo">DMaior Agency</div>
      <div class="login-sub">Painel do Streamer</div>

      <div class="login-field">
        <label for="inp-email">E-mail</label>
        <input type="email" id="inp-email" placeholder="seu@email.com" autocomplete="email">
      </div>

      <div class="login-field">
        <label for="inp-senha">Senha</label>
        <input type="password" id="inp-senha" placeholder="••••••••" autocomplete="current-password">
        <button class="toggle-pw" id="toggle-pw" type="button" aria-label="Mostrar senha">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <button class="btn-entrar" id="btn-entrar">Entrar</button>
      <div class="login-erro" id="login-erro"></div>
    </div>
  </div>

  <!-- ── Painel do Streamer (após login) ── -->
  <div id="painel-screen">
    <main class="dm-main">
      <div class="painel-wrap">
        <div class="painel-header">
          <h1>Meu Painel</h1>
          <div class="painel-user">
            <img id="p-avatar" class="painel-avatar"
              src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
              alt="Foto de perfil">
            <span class="painel-nome" id="p-nome">Streamer</span>
          </div>
        </div>
        <div id="painel-content"></div>
      </div>
    </main>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <!-- router.js não é carregado aqui: painel tem login próprio e o router bloquearia a tela -->
  <script src="../js/utils/storage.js"></script>
  <script src="../js/components/menu-mobile.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const session = window.Auth ? Auth.getSession() : null;

      // Se já tem sessão válida, mostra o painel direto
      if (session) {
        mostrarPainel(session);
        return;
      }

      // Senão mostra tela de login
      document.getElementById('login-screen').style.display = 'flex';

      // ── Toggle de senha ──
      const toggleBtn = document.getElementById('toggle-pw');
      const inpSenha  = document.getElementById('inp-senha');
      toggleBtn.addEventListener('click', () => {
        const visivel = inpSenha.type === 'text';
        inpSenha.type = visivel ? 'password' : 'text';
      });

      // ── Submit ao pressionar Enter ──
      document.getElementById('inp-senha').addEventListener('keydown', e => {
        if (e.key === 'Enter') tentarLogin();
      });
      document.getElementById('inp-email').addEventListener('keydown', e => {
        if (e.key === 'Enter') tentarLogin();
      });

      document.getElementById('btn-entrar').addEventListener('click', tentarLogin);
    });

    async function tentarLogin() {
      const email  = document.getElementById('inp-email').value.trim();
      const senha  = document.getElementById('inp-senha').value;
      const btn    = document.getElementById('btn-entrar');
      const erroEl = document.getElementById('login-erro');

      erroEl.style.display = 'none';

      if (!email || !senha) {
        mostrarErro('Preencha e-mail e senha.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Entrando...';

      try {
        const res = await window.DmaiorAPI.auth.login(email, senha);

        if (res && res.token) {
          // Salva sessão e atualiza menus
          Auth.saveSession({
            uid:   res.uid   || '',
            token: res.token,
            email: email,
            foto:  res.foto  || '',
            nome:  res.nome  || email,
          });
          mostrarPainel(Auth.getSession());
        } else {
          mostrarErro(res?.erro || 'E-mail ou senha incorretos.');
        }
      } catch (err) {
        mostrarErro('Erro de conexão. Tente novamente.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    }

    function mostrarErro(msg) {
      const erroEl = document.getElementById('login-erro');
      erroEl.textContent = msg;
      erroEl.style.display = 'block';
    }

    function mostrarPainel(session) {
      // Esconde login, mostra painel
      document.getElementById('login-screen').style.display  = 'none';
      document.getElementById('painel-screen').style.display = 'block';

      // Preenche avatar e nome
      const avatarEl = document.getElementById('p-avatar');
      const nomeEl   = document.getElementById('p-nome');

      if (session.foto) {
        try {
          const u = new URL(String(session.foto));
          if (u.protocol === 'http:' || u.protocol === 'https:') avatarEl.src = session.foto;
        } catch {}
      }
      if (session.nome)  nomeEl.textContent = session.nome.split(' ')[0];
      if (session.email) nomeEl.title       = session.email;

      // Cards de estatísticas (placeholder — integrar com dashboard Worker)
      document.getElementById('painel-content').innerHTML = `
        <div class="painel-cards">
          <div class="stat-card dm-glass-card">
            <div class="stat-label">💎 Diamantes do Mês</div>
            <div class="stat-value" id="stat-diamonds">—</div>
            <div class="stat-sub">Ranking em tempo real</div>
          </div>
          <div class="stat-card dm-glass-card">
            <div class="stat-label">⏱ Horas de Live</div>
            <div class="stat-value" id="stat-hours">—</div>
            <div class="stat-sub">Acumulado no mês</div>
          </div>
          <div class="stat-card dm-glass-card">
            <div class="stat-label">🏆 Posição no Ranking</div>
            <div class="stat-value" id="stat-rank">—</div>
            <div class="stat-sub">Entre os streamers ativos</div>
          </div>
        </div>
        <div style="text-align:center;margin-top:20px">
          <button class="dm-btn-danger" id="btn-logout-painel">Sair da conta</button>
        </div>`;

      document.getElementById('btn-logout-painel').addEventListener('click', () => {
        if (window.Auth) {
          Auth.logout();
          // Volta para tela de login ao sair
          document.getElementById('painel-screen').style.display  = 'none';
          document.getElementById('login-screen').style.display   = 'flex';
          document.getElementById('inp-email').value = '';
          document.getElementById('inp-senha').value = '';
        }
      });
    }
  </script>
</body>
</html>
