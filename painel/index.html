<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <base href="/teste/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel do Streamer — DMaior Agency</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .painel-wrap {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .painel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 15px;
    }
    .painel-header h1 {
      font-family: var(--dm-font-title);
      color: var(--dm-cyan);
      font-size: clamp(1.4rem, 4vw, 2rem);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .painel-user {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .painel-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid var(--dm-cyan);
      object-fit: cover;
    }
    .painel-nome {
      font-family: var(--dm-font-title);
      color: var(--dm-text);
      font-size: 1rem;
      letter-spacing: 1px;
    }
    .painel-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      padding: 24px;
    }
    .stat-label {
      font-size: 0.75rem;
      color: var(--dm-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }
    .stat-value {
      font-family: var(--dm-font-title);
      font-size: 2rem;
      color: var(--dm-cyan);
      letter-spacing: 1px;
    }
    .stat-sub {
      font-size: 0.8rem;
      color: var(--dm-text-muted);
      margin-top: 4px;
    }
    .painel-loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--dm-blue);
      font-family: var(--dm-font-title);
      font-size: 1.1rem;
    }
    .painel-loading .dm-spinner { margin-bottom: 15px; }
  </style>
</head>
<body>
  <menu-mobile-dmaior></menu-mobile-dmaior>

  <main class="dm-main">
    <div class="painel-wrap">
      <div class="painel-header">
        <h1>Meu Painel</h1>
        <div class="painel-user">
          <img id="p-avatar" class="painel-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Foto de perfil">
          <span class="painel-nome" id="p-nome">Carregando...</span>
        </div>
      </div>

      <div id="painel-content">
        <div class="painel-loading dm-glass-card">
          <div class="dm-spinner"></div>
          Carregando seus dados...
        </div>
      </div>
    </div>
  </main>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/router.js"></script>
  <script src="../js/utils/storage.js"></script>
  <script src="../js/components/menu-mobile.js"></script>
  <script>
    // Inicializa painel — protegerPagina já redireciona se não logado
    document.addEventListener('DOMContentLoaded', () => {
      const session = window.Auth ? Auth.getSession() : null;
      if (!session) {
        window.location.href = '/?redirect=/painel/';
        return;
      }

      // Exibe dados básicos do streamer
      const avatarEl = document.getElementById('p-avatar');
      const nomeEl   = document.getElementById('p-nome');
      if (session.foto)  avatarEl.src         = session.foto;
      if (session.nome)  nomeEl.textContent   = session.nome;
      if (session.email) nomeEl.title         = session.email;

      // Conteúdo do painel (placeholder — integrar com dashboard Worker)
      document.getElementById('painel-content').innerHTML = `
        <div class="painel-cards">
          <div class="stat-card dm-glass-card">
            <div class="stat-label">💎 Diamantes do Mês</div>
            <div class="stat-value" id="stat-diamonds">—</div>
            <div class="stat-sub">Ranking em tempo real</div>
          </div>
          <div class="stat-card dm-glass-card">
            <div class="stat-label">⏱ Horas de Live</div>
            <div class="stat-value" id="stat-hours">—</div>
            <div class="stat-sub">Acumulado no mês</div>
          </div>
          <div class="stat-card dm-glass-card">
            <div class="stat-label">🏆 Posição no Ranking</div>
            <div class="stat-value" id="stat-rank">—</div>
            <div class="stat-sub">Entre os streamers ativos</div>
          </div>
        </div>
        <div style="text-align:center;margin-top:20px">
          <button class="dm-btn-danger" id="btn-logout-painel">Sair da conta</button>
        </div>`;

      document.getElementById('btn-logout-painel').addEventListener('click', () => {
        if (window.Auth) Auth.logout();
      });
    });
  </script>
</body>
</html>
