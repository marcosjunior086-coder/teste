# =====================================================
# DMaior Agency — Configuração Netlify
# Equivalente ao .htaccess (cabeçalhos + cache)
# =====================================================

# ── Cabeçalhos de segurança (todas as páginas) ────
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options        = "SAMEORIGIN"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# ── Cache de CSS e JS ─────────────────────────────
# FASE DE TESTES: max-age curto para facilitar atualizações sem cache preso.
# Em produção final: trocar para max-age=31536000,immutable SE usar hash/versionamento nos nomes de arquivo.
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# ── Cache para fontes e imagens ───────────────────
[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=15552000"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=15552000"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=15552000"

# ── Cache curto para HTML (1 hora) ────────────────
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"
