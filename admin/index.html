<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <base href="/teste/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin — DMaior Agency</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    /* ── Tela de login admin ── */
    #login-screen {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-height: 100vh;
      padding: 60px 20px 40px;
      background: var(--dm-bg);
    }
    .login-box {
      width: 100%;
      max-width: 360px;
      padding: 40px 32px;
      text-align: center;
    }
    .login-logo {
      font-family: var(--dm-font-title);
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--dm-gold);
      margin-bottom: 4px;
    }
    .login-sub {
      font-size: 0.75rem;
      color: var(--dm-text-muted);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .login-badge {
      display: inline-block;
      padding: 3px 12px;
      background: rgba(240,192,64,0.1);
      border: 1px solid rgba(240,192,64,0.3);
      border-radius: 20px;
      font-size: 0.68rem;
      color: var(--dm-gold);
      font-family: var(--dm-font-title);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }
    .login-field {
      position: relative;
      margin-bottom: 16px;
      text-align: left;
    }
    .login-field label {
      display: block;
      font-size: 0.7rem;
      color: var(--dm-text-muted);
      font-family: var(--dm-font-title);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .login-field input {
      width: 100%;
      padding: 13px 44px 13px 16px;
      background: var(--dm-bg-card);
      border: 1px solid var(--dm-border);
      border-radius: 10px;
      color: var(--dm-text);
      font-family: 'Exo 2', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }
    .login-field input:focus {
      border-color: var(--dm-gold);
      box-shadow: 0 0 0 3px rgba(240,192,64,0.12);
    }
    .toggle-pw {
      position: absolute;
      right: 14px;
      bottom: 13px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--dm-text-muted);
      display: flex;
      align-items: center;
      padding: 0;
      transition: color 0.2s;
    }
    .toggle-pw:hover { color: var(--dm-gold); }
    .btn-entrar {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--dm-gold), #f0a030);
      border: none;
      border-radius: 10px;
      color: #000;
      font-family: var(--dm-font-title);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-entrar:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .btn-entrar:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-erro {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: 8px;
      color: var(--dm-red, #f87171);
      font-size: 0.82rem;
      text-align: left;
    }
    /* ── Painel admin (após login) ── */
    #admin-screen { display: none; }
    .admin-wrap {
      max-width: 960px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .admin-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .admin-header h1 {
      font-family: var(--dm-font-title);
      color: var(--dm-gold);
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }
    .admin-header p {
      color: var(--dm-text-muted);
      font-size: 0.9rem;
    }
    .admin-badge {
      display: inline-block;
      padding: 2px 10px;
      background: rgba(240,192,64,0.1);
      border: 1px solid rgba(240,192,64,0.3);
      border-radius: 20px;
      font-size: 0.7rem;
      color: var(--dm-gold);
      font-family: var(--dm-font-title);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 15px;
    }
    .admin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 18px;
    }
    .admin-card {
      padding: 24px 20px;
      text-align: center;
      cursor: pointer;
      transition: all var(--dm-ease);
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .admin-card:hover {
      transform: translateY(-4px);
      border-color: var(--dm-gold);
    }
    .admin-card-icon { font-size: 2.2rem; }
    .admin-card-title {
      font-family: var(--dm-font-title);
      font-size: 1rem;
      color: var(--dm-text);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .admin-card-desc {
      font-size: 0.8rem;
      color: var(--dm-text-muted);
    }
  </style>
</head>
<body>
  <!-- Admin não tem menu público — acesso por URL direta -->

  <!-- ── Tela de Login ── -->
  <div id="login-screen">
    <div class="login-box dm-glass-card">
      <div class="login-logo">DMaior Agency</div>
      <div class="login-sub">Área Administrativa</div>
      <div class="login-badge">⚙️ Acesso Restrito</div>

      <div class="login-field">
        <label for="inp-senha">Senha de acesso</label>
        <input type="password" id="inp-senha" placeholder="••••••••" autocomplete="current-password">
        <button class="toggle-pw" id="toggle-pw" type="button" aria-label="Mostrar senha">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <button class="btn-entrar" id="btn-entrar">Entrar</button>
      <div class="login-erro" id="login-erro"></div>
    </div>
  </div>

  <!-- ── Painel Admin (após login) ── -->
  <div id="admin-screen">
    <main class="dm-main">
      <div class="admin-wrap">
        <div class="admin-header">
          <div class="admin-badge">⚙️ Área Administrativa</div>
          <h1>Painel Admin</h1>
          <p>Acesso restrito à equipe DMaior Agency</p>
        </div>
        <div id="admin-content"></div>
      </div>
    </main>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/router.js"></script>
  <script src="../js/utils/storage.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const session = window.Auth ? Auth.getSession() : null;

      // Se já tem sessão válida, mostra o painel direto
      if (session) {
        mostrarAdmin(session);
        return;
      }

      // Senão mostra tela de login
      document.getElementById('login-screen').style.display = 'flex';

      // ── Toggle de senha ──
      const toggleBtn = document.getElementById('toggle-pw');
      const inpSenha  = document.getElementById('inp-senha');
      toggleBtn.addEventListener('click', () => {
        inpSenha.type = inpSenha.type === 'text' ? 'password' : 'text';
      });

      // ── Submit com Enter ──
      inpSenha.addEventListener('keydown', e => {
        if (e.key === 'Enter') tentarLogin();
      });

      document.getElementById('btn-entrar').addEventListener('click', tentarLogin);
    });

    async function tentarLogin() {
      const senha  = document.getElementById('inp-senha').value;
      const btn    = document.getElementById('btn-entrar');
      const erroEl = document.getElementById('login-erro');

      erroEl.style.display = 'none';

      if (!senha) {
        mostrarErro('Digite a senha de acesso.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Verificando...';

      try {
        const res = await window.DmaiorAPI.rank.login(senha);

        if (res && res.token) {
          Auth.saveSession({
            uid:   res.uid   || 'admin',
            token: res.token,
            email: res.email || 'admin',
            foto:  '',
            nome:  'Admin',
          });
          mostrarAdmin(Auth.getSession());
        } else {
          mostrarErro(res?.erro || 'Senha incorreta.');
        }
      } catch (err) {
        mostrarErro('Erro de conexão. Tente novamente.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    }

    function mostrarErro(msg) {
      const erroEl = document.getElementById('login-erro');
      erroEl.textContent = msg;
      erroEl.style.display = 'block';
    }

    function mostrarAdmin(session) {
      document.getElementById('login-screen').style.display  = 'none';
      document.getElementById('admin-screen').style.display  = 'block';

      document.getElementById('admin-content').innerHTML = `
        <div class="admin-grid">
          <div class="admin-card dm-glass-card">
            <div class="admin-card-icon">📊</div>
            <div class="admin-card-title">Ranking</div>
            <div class="admin-card-desc">Visualizar ranking geral de diamantes e horas</div>
          </div>
          <div class="admin-card dm-glass-card">
            <div class="admin-card-icon">👥</div>
            <div class="admin-card-title">Streamers</div>
            <div class="admin-card-desc">Gerenciar perfis e métricas dos streamers</div>
          </div>
          <div class="admin-card dm-glass-card">
            <div class="admin-card-icon">🏆</div>
            <div class="admin-card-title">Premiações</div>
            <div class="admin-card-desc">Configurar prêmios por posição no ranking</div>
          </div>
          <div class="admin-card dm-glass-card">
            <div class="admin-card-icon">💸</div>
            <div class="admin-card-title">Recargas</div>
            <div class="admin-card-desc">Histórico de recargas de diamantes</div>
          </div>
          <div class="admin-card dm-glass-card">
            <div class="admin-card-icon">📝</div>
            <div class="admin-card-title">Candidaturas</div>
            <div class="admin-card-desc">Formulários de recrutamento recebidos</div>
          </div>
          <div class="admin-card dm-glass-card">
            <div class="admin-card-icon">⚙️</div>
            <div class="admin-card-title">Configurações</div>
            <div class="admin-card-desc">Parâmetros gerais da agência</div>
          </div>
        </div>
        <div style="text-align:center;margin-top:30px">
          <button class="dm-btn-danger" id="btn-logout-admin">Sair</button>
        </div>`;

      document.getElementById('btn-logout-admin').addEventListener('click', () => {
        if (window.Auth) {
          Auth.logout();
          document.getElementById('admin-screen').style.display  = 'none';
          document.getElementById('login-screen').style.display  = 'flex';
          document.getElementById('inp-senha').value = '';
        }
      });
    }
  </script>
</body>
</html>
